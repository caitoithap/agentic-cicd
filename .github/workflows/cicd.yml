name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    - name: Build frontend
      working-directory: frontend
      run: npm run build
      
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      working-directory: backend
      run: npm ci
    - name: Build backend
      working-directory: backend
      run: npm run build
      
  test:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci
    - name: Run frontend tests
      working-directory: frontend
      run: npm test
    - name: Install backend dependencies
      working-directory: backend
      run: npm ci
    - name: Run backend tests
      working-directory: backend
      run: npm test
      
  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Deploy to production
      env:
        HOST: ${{ secrets.HOST
